<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="global.css">
    <style>
       :root{
        --size-1:0.2rem;
        --size-2:0.3rem;
        --size-3:0.5rem;
        --size-4:0.8rem;
        --size-9:2rem;

        --font-size-default:var(--size-2);
        --font-body-size:var(--size-3);
        --font-title-size:var(--size-9);
       }
        /* * {
            border: 1px dashed grey;
        } */

        h2{font-size: var(--font-title-size);}
        .mainContainer {
            display: grid;
            grid-template: "as mn" auto
                            "as foot" 100px / 200px 100%;
            gap:var(--size-md);
            border: var(--border-default);
            margin: 0 var(--size-md);
            background-color:var(--color-bg-default);
            color:var(--color-text-default);
        }

        aside {
            grid-area: as;
            border: var(--border-accent);
        }

        main {
            grid-area: mn;
            border: 1px dotted green;
        }

        footer {
            grid-area: foot
        }

        .category {
            width: 120px;
            margin: 8px;
            padding: var(--size-md);
            border: 1px solid grey;
            border-radius: var(--border-radius-circle);
        }

        .categories {
            display: flex;
            overflow: hidden;
            border:var(--border-default);
            border-radius:var(--border-radius-circle);
        }
        .items{
            /* display:flex; */
            /* flex-wrap: wrap; */
            display:grid;
            grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
            gap:var(--size-sm);
        }
        .item{
            flex: 1 1 250px;
            padding: var(--size-md);
            border:1px solid grey;
            max-width:350px;
        }
        .category:first-child{background-color: var(--color-accent); border:var(--border-accent);}
        .category:nth-child(3){visibility: hidden;}
        .item>img {
            width: 100%;
            height: auto;
        }
        .item h3{font-size:var(--font-size-default);}
        .item div {display:flex;}
        .item>div{justify-content:space-between;}
        .item>div>div{gap:16px;}
        .item button{width:100%;height: 30px;}
        footer>div{display:flex;flex-wrap:wrap; gap:5px; width:256px; border:1px solid red;justify-content:space-around;align-items:center;}
        footer article{flex:1 0 80px;border:1px solid grey; width:80px;}
        footer button{flex:1 0 100px; height:30px;}

        @media (max-width:600px){
            .mainContainer{
                grid-template:"as" auto
                              "mn" 1fr
                              "foot" 100px / 100%;
            }
            aside{border:none;}
        }
        
        @media (prefers-color-scheme: dark) {
            :root{
                --color-bg-default:var(--color-dark-3);
                --color-text-default:var(--color-bright-4);
            }
        }
    </style>
</head>
