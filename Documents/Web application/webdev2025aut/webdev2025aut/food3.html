<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./food3.css">
    <script type="module" src="./comp/fd-categories.js"></script>
    <script type="module" src="./comp/fd-category.js"></script>
    <style>
        html {
            font-size: 12px;
        }

        .main-container {
            display: grid;
            grid-template: "sid hdr inv" 10vh
                "sid cat inv" auto
                "sid food inv" auto / 10vw 1fr 10vw;
            margin: 0 5vmin;
            padding: var(--padding-default);
        }

        header {
            grid-area: hdr;
            padding: var(--padding-default);
        }

        aside {
            grid-area: sid;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        header,
        aside,
        section {
            border: var(--border-default);
        }

        .invoice {
            grid-area: inv;
        }

        .categories {
            grid-area: cat;
            display: flex;
            flex-wrap: wrap;
            padding-top: 4rem;
            justify-content: space-between;
            gap: var(--size-7);
            position: relative;

        }

        .categories>h2,
        .food>h2 {
            position: absolute;
            top: -20px
        }

        .food {
            grid-area: food;
        }

        .main-container>header {
            display: flex;
            justify-content: space-between;
        }

        .profilebox {
            background-color: red;
            display: flex;
        }

        .adv {
            height: 100px;
            background-color: red;
        }

        .categories>article {
            border: var(--border-default);
            display: flex;
            gap: var(--size-3);
            width: 13vw;
            padding: var(--size-3);
            border-radius: var(--border-radius-md);
            align-items: center;
            min-width: calc(32px + 1rem + 8ch);
            max-width: 15vw;
        }

        .food {
            display: flex;
            flex-flow: row wrap;
            gap: 1em;
            position: relative;
            margin-top: 2rem;
            padding-top: 2rem;

            article {
                border: var(--border-default);
                border-radius: var(--border-radius-default);
                flex: 1 0 var(--size-9);

                img {
                    border-radius: var(--border-radius-circle);
                }
            }
        }

        @media (max-width: 600px) {
            .main-container {
                grid-template: "hdr" 10vh
                    "inv" auto
                    "cat" auto
                    "food" auto
                    "sid" auto / 1fr;
            }

            .categories {
                justify-content: center;
            }
        }
    </style>
</head>
