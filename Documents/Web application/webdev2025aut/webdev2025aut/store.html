<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script type="module" src="./sh-app.js"></script>
    <script type="module" src="./sh-products.js"></script>
    <script type="module" src="./sh-product.js"></script>
    <script type="module" src="./sh-cart.js"></script>
    <style>
        body {
            margin:0;
            padding:0;
            font: normal 100 16px/32px "Ink Free", cursive;

        }

        sh-app {
            margin:0;
            padding: 0 5vw;
            display: grid;
            grid-template:
                "hd hd" 10dvh
                "mn as" 80dvh
                "ft ft" 10dvh / 3fr 1fr;
        }

        header {
            grid-area: hd;
            background-color: #4CAF50;
            color: white;
            padding: 15px;
        }

        main {
            grid-area: mn;
            padding: 15px;
        }

        aside {
            grid-area: as;
            padding: 15px;
            background-color: #6d6868;
        }

        footer {
            grid-area: ft;
            background-color: hsl(122, 39%, 95%);
            color: white;
            text-align: center;
            padding: 10px;
        }
        sh-products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(30ch, 1fr));
            gap: 15px;
        }
        sh-product {
            /* flex: 1 0 50ch; */
            border: 1px solid #ccc;
            border-radius: 8px;
            background-color: white;
            padding:0;
            .product-card{min-width:30ch; margin:0;}
            h3{margin:0 0.5em; }
            img{width:100%;
                aspect-ratio: 3 / 2;}
            p{margin:0 0.5em;}
            button{margin: 0 0.5em;}

            .compact{
                padding: 5px;
                height:4.5em;
                font-size: 0.9em;
                display:flex;
                flex-flow:column wrap;
                h3{width:fit-content;}
                img { height:4em; width:auto;}
            }
        }

        sh-cart{
            display:flex;
            flex-direction:column;
            gap:10px;
        }
    </style>
</head>

<body>
    <sh-app></sh-app>

</body>

</html>
