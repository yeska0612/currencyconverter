<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Font Properties Demo</title>
  <style>
    :root{ --accent:#632E62; --muted:#666; }
    body{font-family:system-ui,Segoe UI,Roboto,Arial;margin:24px;color:#111}
    h1{color:var(--accent)}
    .layout{display:flex;gap:20px;align-items:flex-start}
    .controls{width:420px}
    .controls label{display:block;margin:8px 0 4px;font-size:13px}
    select,input[type=text],input[type=number],input[type=color]{width:100%;padding:6px;box-sizing:border-box}
    .preview{flex:1}
    .preview-box{border:2px solid #ddd;padding:16px;min-height:220px}
    .css-output{white-space:pre;background:#f6f6f8;border:1px solid #eee;padding:8px;font-family:monospace}
    .row{display:flex;gap:8px}
    .btn{background:var(--accent);color:#fff;padding:8px 10px;border-radius:6px;border:none}
    .muted{color:var(--muted)}
  </style>
</head>
<body>
  <h1>Font Properties Demo</h1>
  <p class="muted">Experiment with font properties and see the generated CSS.</p>
  <div class="layout">
    <div class="controls">
      <fieldset>
        <legend>Font family</legend>
        <label for="font-family-select">Choose a family</label>
        <select id="font-family-select">
          <option value="system">System UI</option>
          <option value="Arial, Helvetica, sans-serif">Arial</option>
          <option value="Georgia, serif">Georgia</option>
          <option value="'Times New Roman', Times, serif">Times New Roman</option>
          <option value="'Courier New', Courier, monospace">Courier New</option>
          <option value="Google">Load Google Font</option>
        </select>
        <label for="google-font-name">Font name (Google Font name or custom name)</label>
        <input id="google-font-name" type="text" placeholder="e.g. Roboto or MyWebFont" />
        <label for="web-font-url">Web font file URL (woff/woff2/ttf) — optional</label>
        <input id="web-font-url" type="url" placeholder="https://example.com/fonts/myfont.woff2" />
        <div style="margin-top:8px">
          <button id="load-web-font" class="btn" type="button">Load Web Font</button>
        </div>
      </fieldset>

      <fieldset>
        <legend>Size, Weight, Style</legend>
        <label for="font-size">font-size (px)</label>
        <input id="font-size" type="number" value="28" />
        <label for="font-weight">font-weight</label>
        <select id="font-weight">
          <option>400</option>
          <option>500</option>
          <option>600</option>
          <option>700</option>
          <option>800</option>
        </select>
        <label for="font-style">font-style</label>
        <select id="font-style"><option value="normal">normal</option><option value="italic">italic</option></select>
      </fieldset>

      <fieldset>
        <legend>Spacing & Transform</legend>
        <label for="letter-spacing">letter-spacing (px)</label>
        <input id="letter-spacing" type="number" value="0" />
        <label for="line-height">line-height</label>
        <input id="line-height" type="number" step="0.1" value="1.4" />
        <label for="text-transform">text-transform</label>
        <select id="text-transform"><option value="none">none</option><option value="uppercase">uppercase</option><option value="lowercase">lowercase</option><option value="capitalize">capitalize</option></select>
      </fieldset>

      <fieldset>
        <legend>Decoration & Color</legend>
        <label for="text-decoration">text-decoration</label>
        <select id="text-decoration"><option value="none">none</option><option value="underline">underline</option><option value="line-through">line-through</option></select>
        <label for="font-color">color</label>
        <input id="font-color" type="color" value="#111111" />
      </fieldset>

      <div style="margin-top:8px" class="row">
        <button id="copy-css" class="btn">Copy CSS</button>
        <button id="reset" class="btn" style="background:#666">Reset</button>
      </div>
    </div>

    <div class="preview">
      <div class="preview-box" id="preview-box">
        <p id="preview-text">Монголын үндэсний өв соёл 0123456789</p>
      </div>
      <h3>Generated CSS</h3>
      <div class="css-output" id="css-output"></div>
    </div>
  </div>

  <script>
    const refs = {
      family: document.getElementById('font-family-select'),
      googleName: document.getElementById('google-font-name'),
    webFontUrl: document.getElementById('web-font-url'),
    loadWebFontBtn: document.getElementById('load-web-font'),
      size: document.getElementById('font-size'),
      weight: document.getElementById('font-weight'),
      style: document.getElementById('font-style'),
      letter: document.getElementById('letter-spacing'),
      line: document.getElementById('line-height'),
      transform: document.getElementById('text-transform'),
      decoration: document.getElementById('text-decoration'),
      color: document.getElementById('font-color'),
      previewBox: document.getElementById('preview-box'),
      previewText: document.getElementById('preview-text'),
      cssOutput: document.getElementById('css-output'),
      copyCss: document.getElementById('copy-css'),
      reset: document.getElementById('reset')
    };

  let uploadedFontName = null;

    function applyFontFace(name, dataUrl){
      // create a @font-face and append to head
      const style = document.createElement('style');
      style.textContent = `@font-face{font-family: "${name}"; src: url("${dataUrl}"); font-display: swap;}`;
      document.head.appendChild(style);
    }

    function loadGoogleFont(name){
      // inject link to Google Fonts
      const link = document.createElement('link');
      link.rel = 'stylesheet';
      link.href = `https://fonts.googleapis.com/css2?family=${encodeURIComponent(name)}:wght@400;700&display=swap`;
      document.head.appendChild(link);
    }

    function updatePreview(){
      const familyVal = refs.family.value;
      const sizeVal = refs.size.value + 'px';
      const weightVal = refs.weight.value;
      const styleVal = refs.style.value;
      const letterVal = refs.letter.value + 'px';
      const lineVal = refs.line.value;
      const transformVal = refs.transform.value;
      const decoVal = refs.decoration.value;
      const colorVal = refs.color.value;

      // Decide which font-family to apply safely.
      let appliedFamily = 'system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif';
      if(familyVal === 'Google'){
        const g = refs.googleName.value.trim();
        if(g){
          loadGoogleFont(g);
          appliedFamily = `'${g}', system-ui, sans-serif`;
        }
      } else if(uploadedFontName && familyVal === uploadedFontName){
        appliedFamily = `'${uploadedFontName}', system-ui, sans-serif`;
      } else {
        // Only accept familyVal if it doesn't look like a URL or a font file path
        const lower = (familyVal || '').toLowerCase();
        const looksLikeUrl = lower.includes('://') || lower.endsWith('.woff') || lower.endsWith('.woff2') || lower.endsWith('.ttf') || lower.includes('/');
        if(!looksLikeUrl && familyVal && familyVal !== 'system'){
          appliedFamily = familyVal;
        }
      }
      refs.previewText.style.fontFamily = appliedFamily;

      refs.previewText.style.fontSize = sizeVal;
      refs.previewText.style.fontWeight = weightVal;
      refs.previewText.style.fontStyle = styleVal;
      refs.previewText.style.letterSpacing = letterVal;
      refs.previewText.style.lineHeight = lineVal;
      refs.previewText.style.textTransform = transformVal;
      refs.previewText.style.textDecoration = decoVal;
      refs.previewText.style.color = colorVal;

      const css = `font-family: ${appliedFamily};\nfont-size: ${sizeVal};\nfont-weight: ${weightVal};\nfont-style: ${styleVal};\nletter-spacing: ${letterVal};\nline-height: ${lineVal};\ntext-transform: ${transformVal};\ntext-decoration: ${decoVal};\ncolor: ${colorVal};`;
      refs.cssOutput.textContent = css;
    }

    ['change','input'].forEach(e=>{
      refs.family.addEventListener(e, updatePreview);
      refs.googleName.addEventListener(e, updatePreview);
      refs.size.addEventListener(e, updatePreview);
      refs.weight.addEventListener(e, updatePreview);
      refs.style.addEventListener(e, updatePreview);
      refs.letter.addEventListener(e, updatePreview);
      refs.line.addEventListener(e, updatePreview);
      refs.transform.addEventListener(e, updatePreview);
      refs.decoration.addEventListener(e, updatePreview);
      refs.color.addEventListener(e, updatePreview);
    });

    // load web font from provided URL
    if(refs.loadWebFontBtn){
      refs.loadWebFontBtn.addEventListener('click', ()=>{
        const name = refs.googleName.value.trim();
        const url = refs.webFontUrl.value.trim();
        if(!name || !url) return alert('Provide both a font name and the font file URL');
        // create @font-face rule
        const style = document.createElement('style');
        style.textContent = `@font-face{font-family: "${name}"; src: url("${url}") format('woff2'); font-display: swap;}`;
        document.head.appendChild(style);
        uploadedFontName = name;
        refs.family.value = uploadedFontName;
        updatePreview();
      });
    }

    refs.copyCss.addEventListener('click', async ()=>{ try{ await navigator.clipboard.writeText(refs.cssOutput.textContent); refs.copyCss.textContent='Copied!'; setTimeout(()=>refs.copyCss.textContent='Copy CSS',900); }catch(e){ alert('Clipboard not available'); } });
  refs.reset.addEventListener('click', ()=>{ refs.family.value='system'; refs.googleName.value=''; refs.webFontUrl.value=''; refs.size.value=28; refs.weight.value=400; refs.style.value='normal'; refs.letter.value=0; refs.line.value=1.4; refs.transform.value='none'; refs.decoration.value='none'; refs.color.value='#111111'; uploadedFontName = null; updatePreview(); });

    updatePreview();
  </script>
</body>
</html>
